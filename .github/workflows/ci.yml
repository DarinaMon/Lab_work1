name: Python CI/CD

on:
  push:
    [cite_start]branches: [main] # Workflow запускається при push у гілку main [cite: 86, 108]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        [cite_start]uses: actions/checkout@v3 # Клонування репозиторію [cite: 87, 113]

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          [cite_start]python-version: '3.10' # Встановлення Python [cite: 141]

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi # Встановлення залежностей [cite: 88, 143]

      - name: Run tests
        [cite_start]run: pytest # Запуск тестів [cite: 89, 146]

  deploy:
    [cite_start]needs: build # Цей job почнеться тільки після успішного виконання build [cite: 9, 45]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          # Ми додаємо параметр -o StrictHostKeyChecking=no, щоб workflow не "завис" на питанні про довіру до сервера
          ssh-keyscan -H ${{ secrets.HOST }} >> ~/.ssh/known_hosts [cite: 52-55]

      - name: Deploy via SSH
        run: |
          # Ця команда спробує підключитися. Вона видасть помилку (timeout), 
          # але в логах буде видно, що процес налаштований вірно.
          ssh ${{ secrets.USERNAME }}@${{ secrets.HOST }} 'echo "Deploying application..." && ls -la' [cite: 58]
