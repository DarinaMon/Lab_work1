name: Python CI/CD

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run tests
        run: |
          echo "Running tests..."
          # Імітація успішного тесту
          exit 0

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Fake Setup SSH
        run: |
          echo "Setting up SSH keys..."
          echo "Connecting to ${{ secrets.HOST }}..."
          sleep 2

      - name: Fake Deploy via SSH
        run: |
          echo "Connecting to ${{ secrets.USERNAME }}@${{ secrets.HOST }}..."
          echo "Running ~/deploy.sh on remote server..."
          echo "Updating code with git pull..."
          echo "Restarting Docker containers..."
          echo "Deployment successful!"
          # Ця команда завжди повертає успіх
          exit 0
